<!doctype html><html lang="ja"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>相棒ずかん | Re:seller</title>
<style>
  :root{--navy:#26405f;--navy2:#1d3149;--pink:#cf8f9c;--pinkd:#bd7886;--blue:#7fb0d2;
    --paper:#fff;--line:#f0dde3;--sub:#8a7f84;--ink:#4a4446;--gold:#D9A441;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"Yu Gothic","YuGothic","游ゴシック","Hiragino Kaku Gothic ProN",sans-serif;color:var(--navy);
    background:radial-gradient(120% 70% at 50% 0%,#fef4f7 0%,#fbe9ef 52%,#f1edf8 100%);min-height:100vh;
    display:flex;justify-content:center;-webkit-font-smoothing:antialiased;}
  .app{width:100%;max-width:440px;padding:22px 20px 40px;}
  .hd{text-align:center;margin-bottom:18px;}
  .hd .eb{font-size:11.5px;font-weight:800;color:var(--pinkd);letter-spacing:.16em;margin-bottom:6px;}
  .hd h1{font-size:23px;font-weight:800;letter-spacing:.02em;}
  .hd p{font-size:12px;color:var(--sub);margin-top:7px;line-height:1.6;}

  /* 相棒ステージカード */
  .stage-card{position:relative;background:linear-gradient(135deg,#ffffff,#fdf3f6);border:1px solid var(--line);
    border-radius:22px;padding:20px 18px 18px;box-shadow:0 10px 26px rgba(150,90,95,.1);text-align:center;overflow:hidden;transition:background .4s;}
  .stage-card.dim{background:linear-gradient(135deg,#3f4b5b,#4a4350);border-color:#55606f;}
  .stage-card.dim .sc-name,.stage-card.dim .sc-cap{color:#eef3f8;}
  .stage-card.dim .sc-lvl{color:#f2c9d6;}
  .sc-art{width:150px;height:150px;margin:2px auto 6px;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 50% 42%,rgba(245,166,200,.18),transparent 62%);border-radius:50%;transition:transform .28s;}
  .sc-art.pop{transform:scale(1.12);}
  .sc-art svg{filter:drop-shadow(0 4px 8px rgba(150,90,95,.18));}
  .sc-name{font-size:18px;font-weight:800;}
  .sc-cap{font-size:11.5px;color:var(--sub);margin-top:2px;font-weight:700;}
  .sc-lvl{display:inline-block;margin-top:9px;font-size:12px;font-weight:800;color:var(--pinkd);
    background:#fbe7ec;border-radius:30px;padding:5px 15px;}
  .stage-card.dim .sc-lvl{background:rgba(255,255,255,.14);}

  /* 段階タイムライン */
  .timeline{display:flex;justify-content:space-between;margin:16px 4px 4px;position:relative;}
  .timeline::before{content:"";position:absolute;top:15px;left:12%;right:12%;height:2px;background:var(--line);z-index:0;}
  .tl-step{position:relative;z-index:1;text-align:center;flex:1;}
  .tl-dot{width:30px;height:30px;border-radius:50%;margin:0 auto 4px;background:#fff;border:2px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .3s;}
  .tl-step.on .tl-dot{border-color:var(--pinkd);background:linear-gradient(135deg,#F5A6C8,#B98BEA);transform:scale(1.12);box-shadow:0 4px 10px rgba(189,120,134,.35);}
  .tl-step.on .tl-lbl{color:var(--pinkd);font-weight:800;}
  .tl-lbl{font-size:10px;color:var(--sub);font-weight:700;}
  .tl-lv{font-size:9px;color:#b9adb1;}

  /* コントロール */
  .ctl{margin-top:20px;}
  .row-lbl{font-size:11px;font-weight:800;color:var(--navy);margin:0 2px 8px;letter-spacing:.03em;}
  .chips{display:flex;gap:8px;margin-bottom:16px;}
  .chip{flex:1;border:1px solid var(--line);background:#fff;border-radius:12px;padding:9px 4px;cursor:pointer;text-align:center;
    font-family:inherit;transition:all .2s;}
  .chip .ci{width:30px;height:30px;margin:0 auto 3px;display:block;}
  .chip .cn{font-size:11px;font-weight:800;color:var(--navy);}
  .chip.on{border-color:var(--pinkd);background:#fbe7ec;box-shadow:0 4px 12px rgba(189,120,134,.18);}
  .btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;border:none;cursor:pointer;font-family:inherit;
    font-size:16px;font-weight:800;color:#fff;padding:15px;border-radius:15px;letter-spacing:.03em;
    background:linear-gradient(135deg,#F5A6C8,#B98BEA);box-shadow:0 8px 20px rgba(155,93,229,.26);}
  .btn:active{transform:translateY(2px);}
  .btn.ghost{background:#fff;color:var(--pinkd);border:1px solid var(--line);box-shadow:none;font-size:13px;padding:12px;margin-top:9px;}
  .btn.navy{background:linear-gradient(135deg,#5f97be,#26405f);box-shadow:0 8px 20px rgba(38,64,95,.22);font-size:13px;padding:12px;margin-top:9px;}
  .note{font-size:11px;color:var(--sub);text-align:center;margin-top:12px;line-height:1.7;}
  .toggles{display:flex;gap:9px;margin-top:9px;}
  .toggles .btn{margin-top:0;}
</style></head><body>
<div class="app">
  <div class="hd">
    <div class="eb">Re:seller アシスタント</div>
    <h1>相棒ずかん</h1>
    <p>タイプを選んで「育てる」を押すと、あなたの相棒が卵から進化していきます🥚→🌟</p>
  </div>

  <div class="stage-card" id="card">
    <div class="sc-art" id="art"></div>
    <div class="sc-name" id="nm">たまご</div>
    <div class="sc-cap" id="cap">まいにち続けると進化します</div>
    <div class="sc-lvl" id="lv">Lv 1</div>
  </div>

  <div class="timeline" id="tl"></div>

  <div class="ctl">
    <div class="row-lbl">タイプを選ぶ（診断結果で決まります）</div>
    <div class="chips" id="chips"></div>

    <button class="btn" onclick="grow()">育てる（ミッション提出）▶</button>
    <div class="toggles">
      <button class="btn navy" style="flex:1" onclick="toggleSleep()" id="sleepBtn">2日サボってみる😴</button>
      <button class="btn ghost" style="flex:1;margin-top:0" onclick="reset()">たまごに戻す</button>
    </div>
    <div class="note" id="note">いまは <b>たまご</b>。Lv3で孵化、Lv5でこども、Lv8で成体になります。</div>
  </div>
</div>

<script>
/* ==== アプリ本体と同じドット絵エンジン ==== */
var BUDDY_PAL={driving:{B:"#cf8f9c",D:"#a5626f",L:"#e6b7c0",C:"#bd7886",K:"#26405f"},expressive:{B:"#e5a3b4",D:"#c47e90",L:"#f4c9d4",C:"#e8b04c",K:"#26405f"},amiable:{B:"#8fbcda",D:"#5f97be",L:"#c2ddee",C:"#cf8f9c",K:"#26405f"},analytical:{B:"#5d7695",D:"#26405f",L:"#93a8c1",C:"#7fb0d2",K:"#1d3149"}};
var BUDDY_TYPE_NAME={driving:"主導タイプ",expressive:"促進タイプ",amiable:"支持タイプ",analytical:"分析タイプ"};
var TYPE_CAP={driving:"ぐいぐい前進タイプ",expressive:"きらめき社交タイプ",amiable:"やさしい伴走タイプ",analytical:"コツコツ緻密タイプ"};
var EGG_MARK={driving:[{x:7,y:7,w:2,h:1,c:"L"},{x:6,y:8,w:4,h:1,c:"L"},{x:7,y:9,w:2,h:2,c:"L"}],expressive:[{x:7,y:6,w:2,h:1,c:"C"},{x:6,y:7,w:4,h:1,c:"C"},{x:7,y:8,w:2,h:1,c:"C"},{x:6,y:9,w:1,h:1,c:"C"},{x:9,y:9,w:1,h:1,c:"C"}],amiable:[{x:6,y:7,w:1,h:1,c:"C"},{x:9,y:7,w:1,h:1,c:"C"},{x:6,y:8,w:4,h:1,c:"C"},{x:7,y:9,w:2,h:1,c:"C"}],analytical:[{x:6,y:7,w:4,h:1,c:"L"},{x:6,y:8,w:4,h:1,c:"L"},{x:6,y:9,w:4,h:1,c:"L"},{x:8,y:7,w:1,h:3,c:"D"},{x:6,y:8,w:4,h:1,c:"D"}]};
function px(x,y,w,h,c){return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+c+'"/>';}
function speciesColor(sp){return BUDDY_PAL[sp]||BUDDY_PAL.amiable;}
function buddyEyes(m,xL,xR,y,p){var K=p.K;if(m==="sleepy")return px(xL,y+1,2,1,K)+px(xR,y+1,2,1,K);if(m==="happy")return px(xL,y+1,1,1,K)+px(xL+1,y,1,1,K)+px(xL+2,y+1,1,1,K)+px(xR,y+1,1,1,K)+px(xR+1,y,1,1,K)+px(xR+2,y+1,1,1,K);return px(xL,y,2,2,K)+px(xR,y,2,2,K)+px(xL,y,1,1,"#fff")+px(xR,y,1,1,"#fff");}
function buddyMouth(m,cx,y,p){if(m==="happy")return px(cx-1,y,1,1,p.K)+px(cx,y+1,2,1,p.K)+px(cx+2,y,1,1,p.K);if(m==="sleepy")return px(cx,y,1,1,p.D);return px(cx,y,1,1,p.K)+px(cx+1,y,1,1,p.K);}
function buddyPixels(stage,species,mood){var pal=speciesColor(species);var hasType=!!(species&&BUDDY_PAL[species]);var B=pal.B,D=pal.D,L=pal.L,C=pal.C,K=pal.K;var s="";var zzz=(mood==="sleepy")?px(12,1,1,1,pal.C)+px(13,2,1,1,pal.C)+px(12,3,1,1,pal.C)+px(14,4,1,1,pal.C):"";
 if(stage==="egg"){s+=px(6,2,4,1,B)+px(5,3,6,1,B)+px(4,4,8,1,B)+px(3,5,10,1,B)+px(3,6,10,1,B)+px(3,7,10,1,B)+px(3,8,10,1,B)+px(3,9,10,1,B)+px(3,10,10,1,B)+px(4,11,8,1,B)+px(5,12,6,1,B)+px(6,13,4,1,B);s+=px(6,2,1,1,D)+px(9,2,1,1,D)+px(3,6,1,4,D)+px(12,6,1,4,D)+px(6,13,4,1,D);s+=px(5,4,2,1,L)+px(4,5,1,2,L);if(hasType){(EGG_MARK[species]||[]).forEach(function(m){s+=px(m.x,m.y,m.w,m.h,pal[m.c]||m.c);});}s+=zzz;return s;}
 if(stage==="hatch"){s+=px(3,12,10,1,L)+px(2,13,12,1,B)+px(2,14,12,1,B);s+=px(3,12,1,1,D)+px(6,12,1,1,D)+px(9,12,1,1,D)+px(12,12,1,1,D);s+=px(5,2,1,1,D)+px(10,2,1,1,D);s+=px(5,3,6,1,B)+px(4,4,8,1,B)+px(3,5,10,3,B)+px(3,8,10,2,B)+px(4,10,8,1,B)+px(5,11,6,1,B);s+=px(3,5,1,4,D)+px(12,5,1,4,D)+px(4,4,1,1,D)+px(11,4,1,1,D);s+=px(4,4,3,1,L);s+=px(4,6,2,1,C)+px(10,6,2,1,C);s+=buddyEyes(mood,5,9,6,pal);s+=buddyMouth(mood,7,9,pal);s+=zzz;return s;}
 if(stage==="child"){if(species==="analytical"){s+=px(4,1,2,2,D)+px(10,1,2,2,D);}else if(species==="expressive"){s+=px(4,0,2,3,B)+px(10,0,2,3,B)+px(4,0,2,1,C)+px(10,0,2,1,C);}else{s+=px(4,1,2,2,B)+px(10,1,2,2,B);}s+=px(4,3,8,1,B)+px(3,4,10,4,B)+px(3,8,10,1,B)+px(4,9,8,1,B);s+=px(3,4,1,4,D)+px(12,4,1,4,D)+px(4,3,1,1,D)+px(11,3,1,1,D);s+=px(4,4,3,1,L);s+=px(4,6,1,1,C)+px(11,6,1,1,C);s+=buddyEyes(mood,5,9,5,pal);s+=buddyMouth(mood,7,8,pal);s+=px(5,10,6,3,B)+px(4,11,1,2,B)+px(11,11,1,2,B);s+=px(5,10,6,1,L);s+=px(4,13,2,1,D)+px(10,13,2,1,D);s+=zzz;return s;}
 if(species==="analytical"){s+=px(3,1,2,2,D)+px(11,1,2,2,D);}else if(species==="expressive"){s+=px(3,0,2,3,B)+px(11,0,2,3,B)+px(3,0,2,1,C)+px(11,0,2,1,C);}else if(species==="driving"){s+=px(3,1,3,2,B)+px(10,1,3,2,B)+px(4,1,1,1,C)+px(11,1,1,1,C);}else{s+=px(3,1,2,2,B)+px(11,1,2,2,B);}
 if(species==="analytical"){s+=px(13,8,2,1,D)+px(14,7,1,2,D);}else{s+=px(13,8,2,1,B)+px(13,7,1,1,C)+px(14,6,1,2,B);}
 s+=px(4,2,8,1,B)+px(3,3,10,5,B)+px(3,8,10,1,B)+px(4,9,8,1,B);s+=px(3,3,1,5,D)+px(12,3,1,5,D)+px(4,2,1,1,D)+px(11,2,1,1,D);s+=px(4,3,3,1,L);s+=px(3,6,1,1,C)+px(12,6,1,1,C);s+=buddyEyes(mood,5,9,5,pal);s+=buddyMouth(mood,7,8,pal);s+=px(4,10,8,3,B)+px(3,11,1,2,B)+px(12,11,1,2,B);s+=px(4,10,8,1,L);s+=px(2,11,2,1,D)+px(12,11,2,1,D);s+=px(4,13,3,1,D)+px(9,13,3,1,D);s+=zzz;return s;}
function buddySVG(stage,species,mood,size){return '<svg viewBox="0 0 16 16" width="'+size+'" height="'+size+'" shape-rendering="crispEdges">'+buddyPixels(stage,species,mood)+'</svg>';}
function stageFromLevel(lv){if(lv>=8)return "grown";if(lv>=5)return "child";if(lv>=3)return "hatch";return "egg";}
var STAGE_NAME={egg:"たまご",hatch:"孵化したて",child:"こども",grown:"成体"};
var STAGES=[["egg","たまご","Lv1"],["hatch","孵化","Lv3"],["child","こども","Lv5"],["grown","成体","Lv8"]];
var TYPES=["driving","expressive","amiable","analytical"];

/* ==== 状態 ==== */
var st={species:"expressive",level:1,mood:"happy"};

function tabIcon(t){
  var g={driving:["#F5A6C8","#B98BEA"],expressive:["#F7B7A0","#E79BC0"],amiable:["#8FC0EC","#7FB0D2"],analytical:["#5d7695","#26405f"]}[t];
  return '<svg class="ci" viewBox="0 0 30 30"><defs><linearGradient id="ci'+t+'" x1="0" y1="0" x2="30" y2="30"><stop offset="0" stop-color="'+g[0]+'"/><stop offset="1" stop-color="'+g[1]+'"/></linearGradient></defs><circle cx="15" cy="15" r="12" fill="url(#ci'+t+')"/></svg>';
}
function renderChips(){
  document.getElementById("chips").innerHTML=TYPES.map(function(t){
    return '<button class="chip'+(t===st.species?' on':'')+'" onclick="setType(\''+t+'\')">'+tabIcon(t)+'<span class="cn">'+BUDDY_TYPE_NAME[t].replace("タイプ","")+'</span></button>';
  }).join("");
}
function renderTimeline(){
  var cur=stageFromLevel(st.level);
  document.getElementById("tl").innerHTML=STAGES.map(function(s){
    var on=(s[0]===cur);var ic={egg:"🥚",hatch:"🐣",child:"🐥",grown:"🌟"}[s[0]];
    return '<div class="tl-step'+(on?' on':'')+'"><div class="tl-dot">'+ic+'</div><div class="tl-lbl">'+s[1]+'</div><div class="tl-lv">'+s[2]+'</div></div>';
  }).join("");
}
function render(pop){
  var stage=stageFromLevel(st.level);
  document.getElementById("art").innerHTML=buddySVG(stage,st.species,st.mood,132);
  document.getElementById("nm").textContent=BUDDY_TYPE_NAME[st.species]+"・"+STAGE_NAME[stage];
  document.getElementById("cap").textContent=TYPE_CAP[st.species];
  document.getElementById("lv").textContent="Lv "+st.level;
  document.getElementById("card").classList.toggle("dim",st.mood==="sleepy");
  document.getElementById("sleepBtn").textContent=(st.mood==="sleepy")?"起こす（ミッション再開）☀":"2日サボってみる😴";
  var next={egg:"Lv3で孵化",hatch:"Lv5でこども",child:"Lv8で成体",grown:"最終形態！たくさん育てたね"}[stage];
  document.getElementById("note").innerHTML=(st.mood==="sleepy")
    ? "2日サボると相棒がしょんぼり…😴 <b>ミッションを1つ</b>やると元気に戻ります。"
    : "いまは <b>"+STAGE_NAME[stage]+"</b>。"+next+"。";
  renderChips();renderTimeline();
  if(pop){var a=document.getElementById("art");a.classList.add("pop");setTimeout(function(){a.classList.remove("pop");},280);}
}
function setType(t){st.species=t;render(true);}
function grow(){ if(st.mood==="sleepy"){st.mood="happy";render(true);return;} if(st.level<10)st.level++; st.mood="happy"; render(true);}
function toggleSleep(){st.mood=(st.mood==="sleepy")?"happy":"sleepy";render();}
function reset(){st.level=1;st.mood="happy";render(true);}
render();
</script>
</body></html>
