<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>専用URL発行ツール｜Re:seller アシスタント（運営用）</title>
<style>
  :root{
    --bg:#eaf3fa; --bg2:#f1f7fb; --pinkbg:#fbeef1; --paper:#ffffff;
    --navy:#26405f; --navy2:#1d3149; --pink:#cf8f9c; --pinkd:#bd7886;
    --blue:#7fb0d2; --blued:#5f97be; --ink:#4a4446; --sub:#7d8794; --line:#dce7f0;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);color:var(--ink);
    font-family:"Yu Gothic","YuGothic","游ゴシック","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    display:flex;justify-content:center;-webkit-font-smoothing:antialiased;
  }
  .app{width:100%;max-width:520px;min-height:100vh;background:var(--bg);padding:0 0 40px;}
  .hud{display:flex;align-items:center;gap:8px;padding:14px 18px;background:var(--paper);
    border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5;}
  .hud .logo{font-size:15px;font-weight:800;color:var(--pinkd);letter-spacing:.03em;}
  .hud .logo small{color:var(--sub);font-weight:500;font-size:10px;margin-left:6px;letter-spacing:.05em;}
  .wrap{padding:16px;}
  .sec-title{font-size:13px;color:var(--navy);font-weight:800;margin:4px 2px 12px;letter-spacing:.03em;}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:11.5px;color:var(--sub);font-weight:700;margin-bottom:5px;letter-spacing:.02em;}
  .field label .req{color:var(--pinkd);margin-left:3px;}
  .field input{
    width:100%;padding:12px 13px;border:2px solid var(--line);border-radius:11px;
    font-size:15px;color:var(--navy);font-family:inherit;background:var(--paper);}
  .field input:focus{outline:none;border-color:var(--blue);}
  .field .hint{font-size:10.5px;color:var(--sub);margin-top:5px;line-height:1.5;}
  .btn{display:block;width:100%;border:none;cursor:pointer;padding:14px;border-radius:14px;
    font-size:15px;font-weight:800;font-family:inherit;transition:transform .05s;}
  .btn.pink{background:linear-gradient(135deg,var(--pink),var(--pinkd));color:#fff;box-shadow:0 3px 0 #a76673;}
  .btn.pink:active{transform:translateY(3px);box-shadow:0 0 0 #a76673;}
  .btn.navy{background:var(--navy);color:#fff;box-shadow:0 3px 0 var(--navy2);}
  .btn.navy:active{transform:translateY(3px);box-shadow:0 0 0 var(--navy2);}
  .btn.ghost{background:transparent;color:var(--sub);box-shadow:none;font-size:13px;padding:11px;border:1px solid var(--line);}
  .btn.sm{padding:11px;font-size:13px;border-radius:11px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .urlbox{background:var(--navy);color:#fff;border-radius:14px;padding:14px 15px;margin-bottom:12px;
    word-break:break-all;font-size:13.5px;line-height:1.6;font-weight:700;}
  .urlbox .k{font-size:10px;color:#b9cbe0;font-weight:700;letter-spacing:.05em;margin-bottom:6px;display:block;}
  .note{font-size:11px;color:var(--sub);line-height:1.7;background:var(--bg2);border-radius:11px;
    padding:11px 13px;margin-top:2px;}
  .note b{color:var(--pinkd);}
  .hist{margin-top:4px;}
  .hist .row{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:11px 12px;margin-bottom:9px;}
  .hist .nm{font-size:13px;font-weight:800;color:var(--navy);}
  .hist .u{font-size:10.5px;color:var(--sub);word-break:break-all;margin-top:4px;line-height:1.5;}
  .hist .acts{display:flex;gap:6px;margin-top:8px;}
  .hist .acts button{flex:1;font-size:11px;font-weight:700;padding:7px;border-radius:9px;
    border:1px solid var(--line);background:var(--bg2);color:var(--navy);cursor:pointer;font-family:inherit;}
  .empty{text-align:center;color:var(--sub);font-size:12px;padding:20px 10px;line-height:1.8;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;
    padding:11px 20px;border-radius:22px;font-size:12.5px;font-weight:700;z-index:60;opacity:0;
    transition:opacity .3s;pointer-events:none;box-shadow:0 4px 14px rgba(0,0,0,.2);}
  .toast.show{opacity:1;}
  #qrBox{display:none;text-align:center;margin-top:12px;}
  #qrBox canvas{border:1px solid var(--line);border-radius:12px;background:#fff;padding:8px;}
</style>
</head>
<body>
<div class="app">
  <div class="hud">
    <div class="logo">専用URL発行ツール<small>Re:seller アシスタント（運営用）</small></div>
  </div>
  <div class="wrap">
    <div class="sec-title">生徒ごとの専用リンクを発行</div>
    <div class="card">
      <div class="field">
        <label>生徒名<span class="req">*</span></label>
        <input id="in-name" placeholder="例：佐藤 奈緒">
      </div>
      <div class="field">
        <label>生徒の売上管理スプシ URL または ID<span class="req">*</span></label>
        <input id="in-sheet" placeholder="https://docs.google.com/spreadsheets/d/XXX/edit">
        <div class="hint" id="sheetHint">URLを貼るとIDを自動で抜き出します。</div>
      </div>
      <div class="field">
        <label>配布アプリのURL（通常はそのままでOK）</label>
        <input id="in-base" value="https://kumiko0814.github.io/smasell-lp/quest/seller-tool/">
        <div class="hint">生徒がアクセスするアプリ本体の公開URL。基本は変更不要です。</div>
      </div>
      <button class="btn pink" onclick="makeLink()">専用URLを発行する</button>
    </div>

    <div id="resultCard" class="card" style="display:none">
      <div style="font-size:12px;font-weight:800;color:var(--navy);margin-bottom:10px;" id="resultTitle"></div>
      <div class="urlbox"><span class="k">専用URL</span><span id="outUrl"></span></div>
      <div class="row2" style="margin-bottom:10px">
        <button class="btn navy sm" onclick="copyUrl()">URLをコピー</button>
        <button class="btn ghost sm" onclick="copyLineMsg()">LINE文面ごとコピー</button>
      </div>
      <button class="btn ghost sm" onclick="toggleQR()" id="qrBtn">QRコードを表示</button>
      <div id="qrBox"><canvas id="qrCanvas" width="220" height="220"></canvas></div>
      <div class="note" style="margin-top:12px">
        <b>LINE送付の例文</b>：〇〇さん専用の出品アプリです。このリンクを開いてお使いください→（URL）
      </div>
    </div>

    <div class="sec-title">発行履歴</div>
    <div id="histList" class="hist"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
"use strict";
var HKEY = "seller_linkmaker_history";
var issuedLinks = [];
var lastUrl = "", lastName = "";

function toast(m){ var t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); setTimeout(function(){t.classList.remove("show");},1600); }
function esc(s){ return (s||"").replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }

/* スプシURLからID抽出（/d/XXX/ 形式）。すでにIDならそのまま返す */
function extractSheetId(v){
  v=(v||"").trim();
  var m=v.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if(m) return m[1];
  return v;
}
document.getElementById("in-sheet").addEventListener("input",function(){
  var id=extractSheetId(this.value);
  document.getElementById("sheetHint").textContent = id? ("スプシID："+id) : "URLを貼るとIDを自動で抜き出します。";
});

/* 専用URL生成：<ベース>?sheet=<ID>&name=<URLエンコード名> */
function buildUrl(base, id, name){
  base=(base||"").trim();
  var sep = base.indexOf("?")>=0 ? "&" : "?";
  return base + sep + "sheet=" + encodeURIComponent(id) + "&name=" + encodeURIComponent(name);
}

function makeLink(){
  var name=document.getElementById("in-name").value.trim();
  var sheetRaw=document.getElementById("in-sheet").value.trim();
  var base=document.getElementById("in-base").value.trim();
  if(!name){ toast("生徒名を入れてね"); return; }
  if(!sheetRaw){ toast("スプシURL/IDを入れてね"); return; }
  if(!base){ toast("配布アプリのURLを入れてね"); return; }
  var id=extractSheetId(sheetRaw);
  var url=buildUrl(base, id, name);
  lastUrl=url; lastName=name;

  document.getElementById("resultTitle").textContent = name+"さん の専用URL";
  document.getElementById("outUrl").textContent = url;
  document.getElementById("resultCard").style.display="block";
  document.getElementById("qrBox").style.display="none";
  document.getElementById("qrBtn").textContent="QRコードを表示";

  issuedLinks.unshift({name:name, url:url, id:id, at:Date.now()});
  saveHistory(); renderHistory();
  document.getElementById("resultCard").scrollIntoView({behavior:"smooth",block:"center"});
}

function lineMsg(name,url){
  return name+"さん専用の出品アプリです。このリンクを開いてお使いください→"+url;
}
function copyText(text, okMsg){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){ toast(okMsg); },function(){ fallbackCopy(text, okMsg); });
  } else { fallbackCopy(text, okMsg); }
}
function fallbackCopy(text, okMsg){
  var ta=document.createElement("textarea");
  ta.value=text; ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta);
  ta.select();
  try{ document.execCommand("copy"); toast(okMsg); }catch(e){ toast("コピーできませんでした"); }
  document.body.removeChild(ta);
}
function copyUrl(){ if(!lastUrl){toast("先に発行してね");return;} copyText(lastUrl,"URLをコピーしました"); }
function copyLineMsg(){ if(!lastUrl){toast("先に発行してね");return;} copyText(lineMsg(lastName,lastUrl),"LINE文面をコピーしました"); }

/* ===== 発行履歴（localStorage・運営端末のみ） ===== */
function loadHistory(){ try{ var raw=localStorage.getItem(HKEY); if(raw) issuedLinks=JSON.parse(raw)||[]; }catch(e){ issuedLinks=[]; } }
function saveHistory(){ try{ localStorage.setItem(HKEY, JSON.stringify(issuedLinks.slice(0,50))); }catch(e){} }
function renderHistory(){
  var el=document.getElementById("histList");
  if(!issuedLinks.length){ el.innerHTML='<div class="empty">まだ発行していません。<br>上のフォームから生徒の専用URLを作れます。</div>'; return; }
  el.innerHTML=issuedLinks.map(function(h,i){
    return '<div class="row">'+
      '<div class="nm">'+esc(h.name)+'さん</div>'+
      '<div class="u">'+esc(h.url)+'</div>'+
      '<div class="acts">'+
        '<button onclick="histCopyUrl('+i+')">URLコピー</button>'+
        '<button onclick="histCopyLine('+i+')">LINE文面</button>'+
        '<button onclick="histDel('+i+')">削除</button>'+
      '</div>'+
    '</div>';
  }).join("");
}
function histCopyUrl(i){ var h=issuedLinks[i]; if(h) copyText(h.url,"URLをコピーしました"); }
function histCopyLine(i){ var h=issuedLinks[i]; if(h) copyText(lineMsg(h.name,h.url),"LINE文面をコピーしました"); }
function histDel(i){ issuedLinks.splice(i,1); saveHistory(); renderHistory(); toast("削除しました"); }

/* ===== 軽量QR（外部ライブラリ・CDN不使用の自前実装） ===== */
function toggleQR(){
  var box=document.getElementById("qrBox");
  if(box.style.display==="block"){ box.style.display="none"; document.getElementById("qrBtn").textContent="QRコードを表示"; return; }
  if(!lastUrl){ toast("先に発行してね"); return; }
  try{
    drawQR(document.getElementById("qrCanvas"), lastUrl);
    box.style.display="block";
    document.getElementById("qrBtn").textContent="QRコードを隠す";
  }catch(e){ toast("QRが長すぎて生成できませんでした。URLコピーをお使いください"); }
}
/* --- 最小QRエンコーダ（byte mode, EC level L, version自動選択） --- */
function drawQR(canvas, text){
  var qr = qrEncode(text);
  var n = qr.size, modules = qr.modules;
  var quiet=4, scale=Math.max(2, Math.floor(canvas.width/(n+quiet*2)));
  var px=(n+quiet*2)*scale;
  canvas.width=px; canvas.height=px;
  var ctx=canvas.getContext("2d");
  ctx.fillStyle="#fff"; ctx.fillRect(0,0,px,px);
  ctx.fillStyle="#26405f";
  for(var r=0;r<n;r++) for(var c=0;c<n;c++) if(modules[r][c])
    ctx.fillRect((c+quiet)*scale,(r+quiet)*scale,scale,scale);
}
/* ---- QR core (byte mode, level L) ---- */
function qrEncode(text){
  var data=[]; for(var i=0;i<text.length;i++){
    var cc=text.charCodeAt(i);
    if(cc<128) data.push(cc);
    else { var enc=unescape(encodeURIComponent(text.charAt(i))); for(var j=0;j<enc.length;j++) data.push(enc.charCodeAt(j)); }
  }
  var capL=[0,17,32,53,78,106,134,154,192,230,271,321,367,425,458,520,586,644,718,792,858,929,1003,1091,1171,1273,1367,1465,1528,1628,1732,1840,1952,2068,2188,2303,2431,2563,2699,2809,2953];
  var ver=0; for(var v=1;v<=40;v++){ if(data.length+2<=capL[v]){ ver=v; break; } }
  if(!ver) throw "too long";
  var ecc=eccInfoL(ver);
  var size=17+ver*4;
  var totalDataCw=ecc.totalDataCodewords;
  var bits=[];
  function put(val,len){ for(var b=len-1;b>=0;b--) bits.push((val>>b)&1); }
  put(4,4);
  var cntLen = ver<10?8:16;
  put(data.length,cntLen);
  for(var d=0;d<data.length;d++) put(data[d],8);
  var rem=totalDataCw*8 - bits.length;
  if(rem>0) put(0, Math.min(4,rem));
  while(bits.length%8!==0) bits.push(0);
  var dataCw=[]; for(var k=0;k<bits.length;k+=8){ var byte=0; for(var b2=0;b2<8;b2++) byte=(byte<<1)|bits[k+b2]; dataCw.push(byte); }
  var pad=[236,17], pi=0;
  while(dataCw.length<totalDataCw){ dataCw.push(pad[pi%2]); pi++; }
  // split into blocks
  var blocks=ecc.blocks, allData=[], allEcc=[], idx=0;
  var gen=rsGen(ecc.ecPerBlock);
  for(var bl=0;bl<blocks.length;bl++){
    var cnt=blocks[bl][0], dc=blocks[bl][1];
    for(var bb=0;bb<cnt;bb++){
      var blockData=dataCw.slice(idx, idx+dc); idx+=dc;
      allData.push(blockData);
      allEcc.push(rsEncode(blockData, gen, ecc.ecPerBlock));
    }
  }
  // interleave
  var finalCw=[];
  var maxD=0; for(var a=0;a<allData.length;a++) maxD=Math.max(maxD,allData[a].length);
  for(var col=0;col<maxD;col++) for(var bb2=0;bb2<allData.length;bb2++) if(col<allData[bb2].length) finalCw.push(allData[bb2][col]);
  var maxE=ecc.ecPerBlock;
  for(var col2=0;col2<maxE;col2++) for(var bb3=0;bb3<allEcc.length;bb3++) finalCw.push(allEcc[bb3][col2]);

  // build matrix
  var m=[], used=[];
  for(var r=0;r<size;r++){ m.push([]); used.push([]); for(var c=0;c<size;c++){ m[r].push(0); used[r].push(false); } }
  function setF(r,c,val){ m[r][c]=val?1:0; used[r][c]=true; }
  function finder(r,c){ for(var dr=-1;dr<=7;dr++) for(var dc=-1;dc<=7;dc++){ var rr=r+dr,cc=c+dc; if(rr<0||rr>=size||cc<0||cc>=size) continue;
    var on=(dr>=0&&dr<=6&&(dc===0||dc===6))||(dc>=0&&dc<=6&&(dr===0||dr===6))||(dr>=2&&dr<=4&&dc>=2&&dc<=4); setF(rr,cc,on); } }
  finder(0,0); finder(0,size-7); finder(size-7,0);
  // timing
  for(var t=8;t<size-8;t++){ if(!used[6][t]) setF(6,t,t%2===0); if(!used[t][6]) setF(t,6,t%2===0); }
  // alignment
  var aligns=alignPos(ver);
  for(var ai=0;ai<aligns.length;ai++) for(var aj=0;aj<aligns.length;aj++){
    var ar=aligns[ai], ac=aligns[aj];
    if(used[ar][ac]) continue;
    for(var dr2=-2;dr2<=2;dr2++) for(var dc2=-2;dc2<=2;dc2++){
      var on2=Math.max(Math.abs(dr2),Math.abs(dc2))!==1; setF(ar+dr2,ac+dc2,on2);
    }
  }
  setF(size-8,8,1); // dark module
  // reserve format areas
  for(var fi=0;fi<=8;fi++){ if(!used[8][fi]) used[8][fi]=true; if(!used[fi][8]) used[fi][8]=true; }
  for(var fj=0;fj<8;fj++){ if(!used[8][size-1-fj]) used[8][size-1-fj]=true; if(!used[size-1-fj][8]) used[size-1-fj][8]=true; }

  // place data with mask 0
  var dirUp=true, bit=0, byteIdx=0;
  for(var colp=size-1; colp>0; colp-=2){
    if(colp===6) colp--;
    for(var rowp=0; rowp<size; rowp++){
      var rr2 = dirUp? (size-1-rowp) : rowp;
      for(var cc2=0; cc2<2; cc2++){
        var cx=colp-cc2;
        if(used[rr2][cx]) continue;
        var dark=0;
        if(byteIdx<finalCw.length){ dark=(finalCw[byteIdx]>>(7-bit))&1; }
        if((rr2+cx)%2===0) dark^=1; // mask 0
        m[rr2][cx]=dark; used[rr2][cx]=true;
        bit++; if(bit===8){ bit=0; byteIdx++; }
      }
    }
    dirUp=!dirUp;
  }
  // format info (level L=01, mask0)
  var fmt=formatBits(0);
  var fmtPos1=[[0,8],[1,8],[2,8],[3,8],[4,8],[5,8],[7,8],[8,8],[8,7],[8,5],[8,4],[8,3],[8,2],[8,1],[8,0]];
  var fmtPos2=[[8,size-1],[8,size-2],[8,size-3],[8,size-4],[8,size-5],[8,size-6],[8,size-7],[size-8,8],[size-7,8],[size-6,8],[size-5,8],[size-4,8],[size-3,8],[size-2,8],[size-1,8]];
  for(var f=0;f<15;f++){ var b=(fmt>>f)&1; m[fmtPos1[f][0]][fmtPos1[f][1]]=b; m[fmtPos2[f][0]][fmtPos2[f][1]]=b; }
  return {size:size, modules:m};
}
function eccInfoL(ver){
  // [totalDataCodewords, ecPerBlock, blocks:[[count,dataPerBlock],...]] for level L
  var T={
    1:[19,7,[[1,19]]],2:[34,10,[[1,34]]],3:[55,15,[[1,55]]],4:[80,20,[[1,80]]],
    5:[108,26,[[1,108]]],6:[136,18,[[2,68]]],7:[156,20,[[2,78]]],8:[194,24,[[2,97]]],
    9:[232,30,[[2,116]]],10:[274,18,[[2,68],[2,69]]],11:[324,20,[[4,81]]],12:[370,24,[[2,92],[2,93]]],
    13:[428,26,[[4,107]]],14:[461,30,[[3,115],[1,116]]],15:[523,22,[[5,87],[1,88]]],16:[589,24,[[5,98],[1,99]]],
    17:[647,28,[[1,107],[5,108]]],18:[721,30,[[5,120],[1,121]]],19:[795,28,[[3,113],[4,114]]],20:[861,28,[[3,107],[5,108]]]
  };
  var e=T[ver]||T[10];
  return {totalDataCodewords:e[0], ecPerBlock:e[1], blocks:e[2]};
}
function alignPos(ver){
  if(ver===1) return [];
  var tbl={2:[6,18],3:[6,22],4:[6,26],5:[6,30],6:[6,34],7:[6,22,38],8:[6,24,42],9:[6,26,46],10:[6,28,50],
    11:[6,30,54],12:[6,32,58],13:[6,34,62],14:[6,26,46,66],15:[6,26,48,70],16:[6,26,50,74],17:[6,30,54,78],
    18:[6,30,56,82],19:[6,30,58,86],20:[6,34,62,90]};
  return tbl[ver]||[];
}
/* Galois field for RS */
var GF_EXP=[], GF_LOG=[];
(function(){ var x=1; for(var i=0;i<256;i++){ GF_EXP[i]=x; GF_LOG[x]=i; x<<=1; if(x&0x100) x^=0x11d; } for(var i2=255;i2<512;i2++) GF_EXP[i2]=GF_EXP[i2-255]; })();
function gfMul(a,b){ if(a===0||b===0) return 0; return GF_EXP[GF_LOG[a]+GF_LOG[b]]; }
function rsGen(deg){ var g=[1]; for(var i=0;i<deg;i++){ var ng=new Array(g.length+1).fill(0); for(var j=0;j<g.length;j++){ ng[j]^=gfMul(g[j],GF_EXP[i]); ng[j+1]^=g[j]; } g=ng; } return g; }
function rsEncode(data, gen, ec){
  var res=new Array(ec).fill(0);
  var buf=data.concat(res);
  for(var i=0;i<data.length;i++){
    var coef=buf[i]; if(coef!==0){ for(var j=0;j<gen.length;j++) buf[i+j]^=gfMul(gen[j],coef); }
  }
  return buf.slice(data.length);
}
function formatBits(mask){
  // level L = 01, combine with mask (3 bits)
  var data=(1<<3)|mask; // 01 << 3 | mask
  var d=data<<10; var g=0x537;
  var rem=d;
  for(var i=14;i>=10;i--){ if((rem>>i)&1) rem^= (g<<(i-10)); }
  var bits=((data<<10)|rem) ^ 0x5412;
  return bits;
}

/* init */
loadHistory(); renderHistory();
</script>
</body>
</html>
